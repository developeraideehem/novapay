apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: novapay-ingress
  namespace: novapay
  annotations:
    # Auto-provision Let's Encrypt certificates
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # Route traffic using nginx ingress controller
    kubernetes.io/ingress.class: "nginx"
    # Basic rate limiting for security
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  tls:
  - hosts:
    - novaapay.site
    - api.novaapay.site
    secretName: novapay-tls-certs
  rules:
  - host: novaapay.site
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: web-svc
            port:
              number: 80
  - host: api.novaapay.site
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: backend-svc
            port:
              number: 3001
