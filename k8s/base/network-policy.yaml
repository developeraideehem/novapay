apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend-network-policy
  namespace: novapay
spec:
  podSelector:
    matchLabels:
      app: novapay-backend
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: novapay-frontend
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 3001
  egress:
  - to:
    # Allow outbound to internet for Paystack and Supabase APIs
    - ipBlock:
        cidr: 0.0.0.0/0
    ports:
    - protocol: TCP
      port: 443 # HTTPS
    - protocol: TCP
      port: 80  # HTTP
    - protocol: UDP
      port: 53  # DNS
    - protocol: TCP
      port: 53  # DNS
