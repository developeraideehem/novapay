name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────
  # Web App — TypeScript + Build
  # ─────────────────────────────────────────
  web:
    name: Web App (Vite + TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint src --ext .ts,.tsx --max-warnings 0
        continue-on-error: true

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_PAYSTACK_PUBLIC_KEY: ${{ secrets.VITE_PAYSTACK_PUBLIC_KEY }}
          VITE_FLUTTERWAVE_PUBLIC_KEY: ${{ secrets.VITE_FLUTTERWAVE_PUBLIC_KEY }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: web-dist
          path: web/dist/
          retention-days: 7

  # ─────────────────────────────────────────
  # Mobile App — TypeScript check
  # ─────────────────────────────────────────
  mobile:
    name: Mobile App (Expo + TypeScript)
    runs-on: ubuntu-latest
    # No defaults.run.working-directory here — app/ may not exist yet.
    # working-directory is set per-step only where needed.

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # No cache: app/ directory does not exist yet in this repo

      - name: Check if app directory exists
        id: app_check
        # Runs from repo root — no working-directory override
        run: |
          if [ -d "app" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⚠️  app/ directory not found — skipping mobile checks."
          fi

      - name: Install dependencies
        if: steps.app_check.outputs.exists == 'true'
        working-directory: app
        run: npm ci

      - name: TypeScript type check
        if: steps.app_check.outputs.exists == 'true'
        working-directory: app
        run: npx tsc --noEmit
        continue-on-error: true


  # ─────────────────────────────────────────
  # Database — Lint SQL files
  # ─────────────────────────────────────────
  database:
    name: Database SQL Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify SQL migration files exist and are non-empty
        run: |
          # Check that at least one migration file exists in supabase/migrations/
          MIGRATION_DIR="supabase/migrations"
          if [ ! -d "$MIGRATION_DIR" ]; then
            echo "ERROR: $MIGRATION_DIR directory is missing"
            exit 1
          fi

          SQL_FILES=$(find "$MIGRATION_DIR" -name "*.sql" | sort)
          if [ -z "$SQL_FILES" ]; then
            echo "ERROR: No .sql migration files found in $MIGRATION_DIR"
            exit 1
          fi

          ALL_OK=true
          for f in $SQL_FILES; do
            if [ ! -s "$f" ]; then
              echo "ERROR: $f is empty"
              ALL_OK=false
            else
              echo "✅ $f — $(wc -l < $f) lines"
            fi
          done

          if [ "$ALL_OK" = false ]; then
            exit 1
          fi
