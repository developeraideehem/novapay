name: ✨ Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: What problem does this feature solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature you'd like
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Feature Area
      options:
        - Wallet / Payments
        - Bill Payments
        - Savings
        - Loans
        - Transfers
        - Authentication / Security
        - UI / UX
        - Performance
        - Infrastructure / DevOps
    validations:
      required: true
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues to avoid duplicates
          required: true
