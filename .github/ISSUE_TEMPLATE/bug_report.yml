name: 🐛 Bug Report
description: File a bug report
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: dropdown
    id: area
    attributes:
      label: Affected Area
      options:
        - Web App
        - Mobile App (iOS)
        - Mobile App (Android)
        - Supabase / Database
        - Payment (Paystack)
        - Payment (Flutterwave)
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - OS: Windows 11 / macOS 14 / Android 14
        - Browser: Chrome 122 (for web)
        - Node.js: 20.x
